modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

# The mod jar can ship a top-level changelog.txt; this hint surfaces it in the
# mod-list UI as additional info.
issueTrackerURL = "https://github.com/AtomicStryker/Necromancy/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
authors = "${mod_authors}"
logoFile = "logo.png"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${mc_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "jei"
type = "optional"
versionRange = "[19.27.0,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "patchouli"
type = "optional"
versionRange = "[1.18.2,)"
ordering = "NONE"
side = "CLIENT"
